services:
  mariadb:
    build: requirements/mariadb/
    container_name: mariadb
    restart: always
    env_file: .env
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build: requirements/wordpress/
    container_name: wordpress
    restart: always
    depends_on:
      - mariadb
    env_file: .env
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception

  nginx:
    build: requirements/nginx/
    container_name: nginx
    restart: always
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception
  static:
    build: requirements/static/
    container_name: static
    restart: always
    depends_on:
      - nginx
    networks:
      - inception 
  adminer:
    build: requirements/bonus/adminer/
    container_name: adminer
    restart: always
    depends_on:
      - mariadb
    networks: 
      - inception
  radis:
    build: requirements/bonus/redis/
    container_name: redis
    restart: always
    depends_on:
      - wordpress
    networks:
      - inception
  ftp:
    build: requirements/bonus/ftp/
    container_name: ftp
    restart: always
    env_file: .env
    ports:
      - "21:21"
      - "10000-10100:10000-10100"
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception
  portainer:
    build: requirements/bonus/portainer/
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - inception

volumes:
    mariadb-data:
      driver: local
      driver_opts:
        type: non
        o: bind
        device: /home/vboxuser/data/mariadb
    wordpress-data:
      driver: local
      driver_opts:
        type: non
        o: bind
        device: /home/vboxuser/data/wordpress
    portainer_data:
      driver: local
      driver_opts:
        type: none
        o: bind
        device: /home/vboxuser/data/portainer
networks:
  inception:
