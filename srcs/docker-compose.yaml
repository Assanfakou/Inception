services:
  mariadb:
    build: requirements/mariadb/
    container_name: mariadb
    restart: on-failure
    env_file: .env
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build: requirements/wordpress/
    container_name: wordpress
    restart: on-failure
    depends_on:
      - mariadb
    env_file: .env
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception

  nginx:
    build: requirements/nginx/
    container_name: nginx
    restart: on-failure
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception

volumes:
    mariadb-data:
      driver: local
      driver_opts:
        type: non
        o: bind
        device: /home/hfakou/data/mariadb
    wordpress-data:
      driver: local
      driver_opts:
        type: non
        o: bind
        device: /home/hfakou/data/wordpress
networks:
  inception:
