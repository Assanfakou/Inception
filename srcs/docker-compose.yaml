services:
  mariadb:
    build: requirements/mariadb/
    container_name: mariadb
    restart: on-failure
    env_file: .env
    volumes:
      - type: bind
        source: /home/hfakou/data/mariadb
        target: /var/lib/mysql
    networks:
      - inception

  wordpress:
    build: requirements/wordpress/
    container_name: wordpress
    restart: on-failure
    depends_on:
      - mariadb
    env_file: .env
    volumes:
      - type: bind
        source: /home/hfakou/data/wordpress
        target: /var/www/html
    networks:
      - inception

  nginx:
    build: requirements/nginx/
    container_name: nginx
    restart: on-failure
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - type: bind
        source: /home/hfakou/data/wordpress
        target: /var/www/html
    networks:
      - inception

networks:
  inception:
